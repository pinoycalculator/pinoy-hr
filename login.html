<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pinoy HR - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0038A8;
    --secondary: #CE1126;
    --accent: #FCD116;
    --bg: #f0f4f8;
    --card: #ffffff;
  }
  * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
  body { margin:0; background: var(--bg); display:flex; align-items:center; justify-content:center; height:100vh; }
  .card {
    background: var(--card); padding:2rem; border-radius:12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 350px; text-align:center; transition: transform 0.3s ease;
  }
  .card:hover { transform: translateY(-5px); }
  h1 { color: var(--primary); margin-bottom:1rem; }
  input { width:100%; padding:0.8rem; margin:0.5rem 0; border-radius:8px; border:1px solid #ccc; transition:0.3s; }
  input:focus { border-color: var(--secondary); outline:none; box-shadow:0 0 5px var(--accent); }
  button {
    width:100%; padding:0.8rem; margin-top:1rem; border:none; border-radius:8px;
    background: linear-gradient(90deg,var(--primary),var(--secondary)); color:#fff; font-weight:700; cursor:pointer; transition:0.3s;
  }
  button:hover { background: linear-gradient(90deg,var(--secondary),var(--primary)); }
  .signup-link { margin-top:1rem; display:block; font-size:0.9rem; color: #555; text-decoration:none; }
  .signup-link:hover { color: var(--primary); }
</style>
</head>
<body>
<div class="card">
  <h1>Pinoy HR 🇵🇭</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <a class="signup-link" href="signup.html">Don't have an account? Sign Up</a>
</div>

<script type="module">
import { login } from './js/auth.js';
document.getElementById('loginBtn').addEventListener('click', () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    login(email, password);
});
</script>
</body>
</html>
