<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pinoy HR - Admin Dashboard</title>
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<header>
  Pinoy HR Admin Dashboard 🇵🇭
  <button id="logoutBtn">Logout</button>
</header>

<div class="container" id="leaveContainer">
  <!-- Leave request cards will appear here -->
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Logout
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

// Load leave requests
async function loadLeaves() {
  const leaveContainer = document.getElementById('leaveContainer');
  leaveContainer.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "leaves"));
  querySnapshot.forEach(docSnap => {
    const leave = docSnap.data();
    const card = document.createElement('div');
    card.className = "card";
    card.innerHTML = `
      <h3>Employee ID: ${leave.userId}</h3>
      <p><strong>Reason:</strong> ${leave.reason}</p>
      <p><strong>From:</strong> ${leave.start} <strong>To:</strong> ${leave.end}</p>
      <p><strong>Status:</strong> ${leave.status}</p>
      <button class="approve">Approve</button>
      <button class="reject">Reject</button>
    `;

    card.querySelector('.approve').addEventListener('click', async () => {
      await updateDoc(doc(db, "leaves", docSnap.id), { status:"approved" });
      loadLeaves();
    });

    card.querySelector('.reject').addEventListener('click', async () => {
      await updateDoc(doc(db, "leaves", docSnap.id), { status:"rejected" });
      loadLeaves();
    });

    leaveContainer.appendChild(card);
  });
}

loadLeaves();
</script>
</body>
</html>
